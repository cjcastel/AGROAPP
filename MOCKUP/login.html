<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agroapp - Acceso</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="card login-box">
            <h2 style="color: var(--color-admin); text-align: center; margin-bottom: 30px;">AgroApp 🌾</h2>
            <form action="dashboard-global.html">
                <div class="mb-3">
                    <label>Usuario / NIF</label>
                    <input type="text" value="B-12345678" placeholder="Ej: B-12345678">
                </div>
                <div class="mb-3" style="margin-bottom: 20px;">
                    <label>Contraseña</label>
                    <input type="password" value="password">
                </div>
                <button type="submit" class="btn btn-primary w-full">Iniciar Sesión</button>
            </form>
            <p style="text-align: center; margin-top: 20px; font-size: 12px; color: #999;">
                v3.5.2 | Cumple normativa CUE/SIEX 2026
            </p>
        </div>
    </div>
</body>
</html>
